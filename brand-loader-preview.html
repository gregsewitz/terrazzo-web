<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BrandLoader Preview</title>
<style>
  :root {
    --t-cream: #FBF5EC;
    --t-coral: #ee716d;
    --t-dark-teal: #3A7D7B;
    --t-ochre: #e0a501;
    --t-navy: #002a55;
    --t-teal: #5BA4A4;
    --t-olive: #6B7C4E;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    background: var(--t-cream);
    font-family: 'Space Mono', monospace;
  }

  .loader-row {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .zz-col {
    width: 24px;
  }
  .zz-col svg { width: 100%; height: 100%; overflow: visible; }

  /* Every block starts invisible, fades in one at a time */
  .zz-block {
    opacity: 0;
    animation: zzBlockIn 0.1s step-end forwards;
  }

  /*
    4 columns × 6 blocks = 24 blocks total.
    Each block: 0.18s apart. 0.3s pause between columns.
    Column 0: 0.00 – 0.90
    Column 1: 1.20 – 2.10
    Column 2: 2.40 – 3.30
    Column 3: 3.60 – 4.50
  */
  .b0  { animation-delay: 0.00s; }
  .b1  { animation-delay: 0.18s; }
  .b2  { animation-delay: 0.36s; }
  .b3  { animation-delay: 0.54s; }
  .b4  { animation-delay: 0.72s; }
  .b5  { animation-delay: 0.90s; }
  .b6  { animation-delay: 1.20s; }
  .b7  { animation-delay: 1.38s; }
  .b8  { animation-delay: 1.56s; }
  .b9  { animation-delay: 1.74s; }
  .b10 { animation-delay: 1.92s; }
  .b11 { animation-delay: 2.10s; }
  .b12 { animation-delay: 2.40s; }
  .b13 { animation-delay: 2.58s; }
  .b14 { animation-delay: 2.76s; }
  .b15 { animation-delay: 2.94s; }
  .b16 { animation-delay: 3.12s; }
  .b17 { animation-delay: 3.30s; }
  .b18 { animation-delay: 3.60s; }
  .b19 { animation-delay: 3.78s; }
  .b20 { animation-delay: 3.96s; }
  .b21 { animation-delay: 4.14s; }
  .b22 { animation-delay: 4.32s; }
  .b23 { animation-delay: 4.50s; }

  .message {
    font-size: 12px;
    color: var(--t-navy);
    opacity: 0;
    animation: zzBlockIn 0.4s ease-out 4.8s forwards;
  }

  @keyframes zzBlockIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  /* After all blocks are in, gentle pulse on the whole row */
  .loader-row {
    animation: zzPulse 2.4s ease-in-out 5.0s infinite;
  }
  @keyframes zzPulse {
    0%, 100% { opacity: 1; }
    50%      { opacity: 0.35; }
  }

  button {
    margin-top: 32px;
    padding: 8px 20px;
    font-size: 13px;
    font-family: inherit;
    color: var(--t-navy);
    border: 1px solid var(--t-navy);
    border-radius: 4px;
    background: transparent;
    cursor: pointer;
  }
  button:hover { background: var(--t-navy); color: var(--t-cream); }
</style>
</head>
<body>

<div class="loader-row">
  <!-- Column 0 -->
  <div class="zz-col">
    <svg viewBox="0 0 134 610" aria-hidden="true">
      <path class="zz-block b0" fill="var(--t-coral)"      d="M 0.01 1.12 L 0.01 67.96 L 66.85 67.96 L 66.85 1.12 Z" />
      <path class="zz-block b1" fill="var(--t-dark-teal)"  d="M 133.68 134.79 L 133.68 67.96 L 66.85 67.96 L 66.85 117.14 L 0.01 117.14 L 0.01 183.98 L 66.85 183.98 L 66.85 134.79 Z" />
      <path class="zz-block b2" fill="var(--t-ochre)"      d="M 0.01 233.16 L 0.01 300 L 66.85 300 L 66.85 250.82 L 133.68 250.82 L 133.68 183.98 L 66.85 183.98 L 66.85 233.16 Z" />

      <path class="zz-block b7"  fill="var(--t-dark-teal)"  d="M 133.68 134.79 L 133.68 67.96 L 66.85 67.96 L 66.85 117.14 L 0.01 117.14 L 0.01 183.98 L 66.85 183.98 L 66.85 134.79 Z" />
      <path class="zz-block b8"  fill="var(--t-ochre)"      d="M 0.01 233.16 L 0.01 300 L 66.85 300 L 66.85 250.82 L 133.68 250.82 L 133.68 183.98 L 66.85 183.98 L 66.85 233.16 Z" />

    </svg>
  </div>

  <!-- Column 2 -->
  <div class="zz-col">
    <svg viewBox="0 0 134 610" aria-hidden="true">
      <path class="zz-block b12" fill="var(--t-coral)"      d="M 0.01 1.12 L 0.01 67.96 L 66.85 67.96 L 66.85 1.12 Z" />
      <path class="zz-block b13" fill="var(--t-dark-teal)"  d="M 133.68 134.79 L 133.68 67.96 L 66.85 67.96 L 66.85 117.14 L 0.01 117.14 L 0.01 183.98 L 66.85 183.98 L 66.85 134.79 Z" />
      <path class="zz-block b14" fill="var(--t-ochre)"      d="M 0.01 233.16 L 0.01 300 L 66.85 300 L 66.85 250.82 L 133.68 250.82 L 133.68 183.98 L 66.85 183.98 L 66.85 233.16 Z" />
      <path class="zz-block b15" fill="var(--t-navy)"       d="M 0.01 349.18 L 0.01 416.02 L 66.85 416.02 L 66.85 366.84 L 133.68 366.84 L 133.68 300 L 66.85 300 L 66.85 349.18 Z" />
      <path class="zz-block b16" fill="var(--t-olive)"       d="M 0.01 465.21 L 0.01 532.04 L 66.85 532.04 L 66.85 482.86 L 133.68 482.86 L 133.68 416.02 L 66.85 416.02 L 66.85 465.21 Z" />
      <path class="zz-block b17" fill="var(--t-coral)"      d="M 66.85 598.88 L 66.85 532.04 L 133.68 532.04 L 133.68 598.88 Z" />
    </svg>

  <!-- Column 3 -->
  <div class="zz-col">
    <svg viewBox="0 0 134 610" aria-hidden="true">
      <path class="zz-block b18" fill="var(--t-coral)"      d="M 0.01 1.12 L 0.01 67.96 L 66.85 67.96 L 66.85 1.12 Z" />
      <path class="zz-block b19" fill="var(--t-dark-teal)"  d="M 133.68 134.79 L 133.68 67.96 L 66.85 67.96 L 66.85 117.14 L 0.01 117.14 L 0.01 183.98 L 66.85 183.98 L 66.85 134.79 Z" />
      <path class="zz-block b20" fill="var(--t-ochre)"      d="M 0.01 233.16 L 0.01 300 L 66.85 300 L 66.85 250.82 L 133.68 250.82 L 133.68 183.98 L 66.85 183.98 L 66.85 233.16 Z" />
      <path class="zz-block b21" fill="var(--t-navy)"       d="M 0.01 349.18 L 0.01 416.02 L 66.85 416.02 L 66.85 366.84 L 133.68 366.84 L 133.68 300 L 66.85 300 L 66.85 349.18 Z" />
      <path class="zz-block b22" fill="var(--t-olive)"       d="M 0.01 465.21 L 0.01 532.04 L 66.85 532.04 L 66.85 482.86 L 133.68 482.86 L 133.68 416.02 L 66.85 416.02 L 66.85 465.21 Z" />
      <path class="zz-block b23" fill="var(--t-coral)"      d="M 66.85 598.88 L 66.85 532.04 L 133.68 532.04 L 133.68 598.88 Z" />
    </svg>
  </div>
</div>

<span class="message">Loading your trip...</span>

<button onclick="location.reload()">Replay animation</button>
</body>
</html>
